{% extends 'tpv/base_tpv.html' %}

{% block tpv_content %}
<div class="container-fluid py-5 mt-5">
  <div class="row justify-content-center">
    <div class="col-xxl-8 col-xl-10 col-lg-12">
      <!-- Contenedor principal con sombra y bordes suaves -->
      <div class="bg-white rounded-4 shadow-lg overflow-hidden">
        <!-- Cabecera elegante -->
        <div class="bg-kudea-dark py-4 px-5">
          <div class="d-flex align-items-center">
            <i class="fas fa-plus-circle text-white fs-2 me-3"></i>
            <h2 class="text-white mb-0 fw-semibold">Registrar Nueva Mesa</h2>
          </div>
        </div>
        
        <!-- Cuerpo del formulario con padding generoso -->
        <div class="p-5">
          <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            
            <div class="row g-4 mb-4">
              <!-- Campo Nombre -->
              <div class="col-md-8">
                <div class="form-floating">
                  <input type="text" name="nombre" maxlength="100" 
                         class="form-control border-2 py-3" 
                         id="id_nombre" required placeholder="Nombre de la mesa">
                  <label for="id_nombre" class="text-kudea">
                    <i class="fas fa-table me-2"></i>Nombre de la Mesa
                  </label>
                  <div class="invalid-feedback mt-2">
                    Por favor ingrese un nombre válido
                  </div>
                </div>
              </div>
              
              <!-- Campo Capacidad -->
              <div class="col-md-4">
                <div class="form-floating">
                  <div class="input-group">
                    <input type="number" name="capacidad" 
                           class="form-control border-2 py-3" 
                           id="id_capacidad" required min="1" max="20" placeholder="4">
                    <span class="input-group-text bg-kudea text-white border-kudea">Personas</span>
                    <label for="id_capacidad" class="text-kudea">
                      <i class="fas fa-users me-2"></i>Capacidad
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Campo Estado con estilo select personalizado -->
            <div class="mb-5">
              <label class="form-label text-kudea fw-semibold fs-5 mb-3">
                <i class="fas fa-power-off me-2"></i>Estado Inicial
              </label>
              <div class="row g-3">
                <div class="col-md-6 col-lg-4">
                  <select name="estado" class="form-select border-2 py-3" id="id_estado" required>
                    <option value="" disabled selected>Seleccione un estado</option>
                    <option value="libre" class="text-success">Libre - Disponible</option>
                    <option value="ocupada" class="text-danger">Ocupada - En uso</option>
                    <option value="esperando" class="text-warning">Esperando pedido</option>
                    <option value="reservada" class="text-primary">Reservada - Confirmada</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Botones de acción alineados perfectamente -->
            <div class="d-flex justify-content-end gap-4 pt-4 mt-3 border-top">
              <a href="{% url 'tpv_app:tpv_mesas' %}" class="btn btn-lg btn-outline-kudea px-5 rounded-3">
                <i class="fas fa-times me-2"></i> Cancelar
              </a>
              <button type="submit" class="btn btn-lg btn-kudea-gradient px-5 rounded-3">
                <i class="fas fa-check-circle me-2"></i> Guardar Mesa
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  :root {
    --kudea-primary: #2c5fb3;
    --kudea-secondary: #3a7bd5;
    --kudea-dark: #1a4a8d;
    --kudea-light: #e8f0fe;
  }
  
  .bg-kudea-dark {
    background-color: var(--kudea-dark);
  }
  
  .bg-kudea {
    background-color: var(--kudea-primary);
  }
  
  .text-kudea {
    color: var(--kudea-primary);
  }
  
  .border-kudea {
    border-color: var(--kudea-primary)!important;
  }
  
  .btn-kudea-gradient {
    background: linear-gradient(135deg, var(--kudea-secondary) 0%, var(--kudea-primary) 100%);
    color: white;
    border: none;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  
  .btn-kudea-gradient:hover {
    background: linear-gradient(135deg, var(--kudea-primary) 0%, var(--kudea-dark) 100%);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(44, 95, 179, 0.25);
  }
  
  .btn-outline-kudea {
    border: 2px solid var(--kudea-primary);
    color: var(--kudea-primary);
    font-weight: 500;
    transition: all 0.3s;
  }
  
  .btn-outline-kudea:hover {
    background-color: var(--kudea-primary);
    color: white;
  }
  
  .form-control, .form-select {
    border-width: 2px;
  }
  
  .form-control:focus, .form-select:focus {
    border-color: var(--kudea-secondary);
    box-shadow: 0 0 0 0.25rem rgba(58, 123, 213, 0.15);
  }
  
  .form-floating label {
    padding-left: 2.5rem;
  }
  
  .form-floating>.form-control:focus~label, 
  .form-floating>.form-control:not(:placeholder-shown)~label {
    transform: scale(0.85) translateY(-1.5rem) translateX(0.5rem);
    color: var(--kudea-primary);
  }
  
  .rounded-4 {
    border-radius: 1rem!important;
  }
</style>

<script>
  // Validación mejorada del formulario
  document.addEventListener('DOMContentLoaded', function() {
    // Validación al enviar
    const forms = document.querySelectorAll('.needs-validation');
    forms.forEach(form => {
      form.addEventListener('submit', function(event) {
        if (!form.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
        }
        form.classList.add('was-validated');
      }, false);
    });
    
    // Efecto hover para los botones
    const buttons = document.querySelectorAll('.btn-kudea-gradient, .btn-outline-kudea');
    buttons.forEach(button => {
      button.addEventListener('mouseenter', function() {
        this.style.transform = 'translateY(-2px)';
      });
      button.addEventListener('mouseleave', function() {
        this.style.transform = 'translateY(0)';
      });
    });
  });
</script>
{% endblock %}
