{% extends 'tpv_shop/base_tpv_shop.html' %}
{% block tpv_content %}
<div class="container py-5">
  <div class="alert alert-danger">
    <h4 class="mb-4">¿Estás seguro de que quieres eliminar este arqueo de caja?</h4>
    <p><strong>Fecha:</strong> {{ object.fecha }}</p>
    <p><strong>Total ventas:</strong> {{ object.total_ventas }} €</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Sí, eliminar</button>
      <a href="{% url 'tpv_shop:caja_arqueo_list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
