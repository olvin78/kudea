  <!-- Enlace al CSS específico de la página de inicio de TPV -->

{% endblock %}

<div class="container mt-4">

<!-- Navegación de Caja Registradora -->
<div class="row row-cols-2 row-cols-md-3 row-cols-lg-6 g-3 mb-4">
  <div class="col">
    <a href="{% url 'tpv_shop:category_list' %}" class="btn btn-light border shadow-sm w-100 text-start d-flex align-items-center gap-2 py-2">
      <i data-lucide="grid" class="text-primary"></i> Ver Productos
    </a>
  </div>
  <div class="col">
    <a href="{% url 'tpv_shop:cart' %}" class="btn btn-light border shadow-sm w-100 text-start d-flex align-items-center gap-2 py-2">
      <i data-lucide="shopping-cart" class="text-primary"></i> Carrito
    </a>

  <div class="col">
    <a href="{% url 'tpv_shop:checkout' %}" class="btn btn-light border shadow-sm w-100 text-start d-flex align-items-center gap-2 py-2">

    </a>
  </div>

    <a href="{% url 'tpv_shop:ticket_list' %}" class="btn btn-light border shadow-sm w-100 text-start d-flex align-items-center gap-2 py-2">

    </a>
  </div>
  <div class="col">

      <i data-lucide="settings" class="text-primary"></i> Configuración
    </a>
  </div>
</div>

{% endblock %}
