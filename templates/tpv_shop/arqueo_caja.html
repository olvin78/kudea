{% extends 'tpv_shop/base_tpv_shop.html' %}
{% load static %}

{% block tpv_content %}
<link rel="stylesheet" href="{% static 'css/arqueo_manual.css' %}">

<div class="arqueo-container">
  <div class="arqueo-header">
    <h1 class="arqueo-title">Arqueo de Caja</h1>
    <p class="arqueo-subtitle">Registro diario de transacciones y efectivo</p>
  </div>
  
  <div class="arqueo-body">
    <form method="POST" id="manual-arqueo-form">
      {% csrf_token %}
      
      <!-- Campos para el arqueo manual -->
      <div class="form-grid">
        <div class="form-group">
          <label for="id_efectivo_inicial" class="form-label">Efectivo Inicial (€)</label>
          <input type="text" name="efectivo_inicial" id="id_efectivo_inicial" 
                 class="form-control" placeholder="0.00" required>
        </div>
        
        <div class="form-group">
          <label for="id_efectivo_final" class="form-label">Efectivo Final (€)</label>
          <input type="text" name="efectivo_final" id="id_efectivo_final" 
                 class="form-control readonly-input" readonly placeholder="0.00">
        </div>
        
        <div class="form-group">
          <label for="id_tarjeta_total" class="form-label">Total Tarjeta (€)</label>
          <input type="text" name="tarjeta_total" id="id_tarjeta_total" 
                 class="form-control" placeholder="0.00">
        </div>
        
        <div class="form-group">
          <label for="id_bizum_total" class="form-label">Total Bizum (€)</label>
          <input type="text" name="bizum_total" id="id_bizum_total" 
                 class="form-control" placeholder="0.00">
        </div>
        
        <div class="form-group">
          <label for="id_total_ventas" class="form-label">Total Ventas (€)</label>
          <input type="text" name="total_ventas" id="id_total_ventas" 
                 class="form-control" placeholder="0.00">
        </div>
      </div>
      
      <!-- Diferencia entre efectivo inicial y final -->
      <div class="total-display">
        Diferencia: <span id="diferencia">0.00 €</span>
      </div>
      
      <div class="form-group">
        <label for="id_observaciones" class="form-label">Observaciones</label>
        <textarea name="observaciones" id="id_observaciones" 
                  class="form-control" rows="3"></textarea>
      </div>

      <!-- Botón de arqueo manual -->
      <button type="submit" class="btn-submit">
        <i class="fas fa-check-circle me-2"></i> Registrar Arqueo Manual
      </button>
    </form>
    
    <!-- Botón de arqueo automático -->
    <button type="button" id="btn-generar-arqueo" class="btn-submit">
      <i class="fas fa-calculator me-2"></i> Generar Arqueo Automático
    </button>
    
    <div id="result-message" class="mt-3"></div>
  </div>
</div>

<script src="{% static 'js/arqueo_manual.js' %}"></script>
{% endblock %}
