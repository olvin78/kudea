<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>KUDEA Fichaje</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <!-- jsQR -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --kudea-primary: #2C3E50;
      --kudea-secondary: #499ecf;
      --kudea-accent: #3498DB;
      --kudea-text: #4d7291;
      --kudea-light: #f8fafc;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--kudea-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header-gradient {
      background: linear-gradient(135deg, var(--kudea-primary) 0%, var(--kudea-accent) 100%);
    }
    
    .scan-container {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(73, 158, 207, 0.7);
      box-shadow: 0 0 15px rgba(73, 158, 207, 0.7);
      animation: scan 2s infinite linear;
      z-index: 10;
    }
    
    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
    
    .clock-display {
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      color: var(--kudea-secondary);
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      background-color: #28a745;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    
    .back-btn {
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      transform: translateX(-3px);
    }
    
    .card-custom {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    
    .card-custom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--kudea-secondary) 0%, var(--kudea-accent) 100%);
    }
  </style>
</head>
<body class="d-flex flex-column">
  <!-- Header -->
  <header class="header-gradient text-white py-3 position-relative">
    <div class="container">
      <div class="d-flex align-items-center justify-content-center position-relative">
        <button class="back-btn btn btn-sm btn-link position-absolute start-0 text-white" onclick="window.history.back()">
          <i class="bi bi-arrow-left fs-4"></i>
        </button>
        <div class="text-center">
          <h1 class="h4 mb-1 fw-normal"><i class="bi bi-fingerprint me-2"></i>KUDEA Fichaje</h1>
          <p class="small mb-0 opacity-75">Sistema de registro horario para empleados</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow-1 py-4">
    <div class="container d-flex justify-content-center align-items-center h-100">
      <div class="card card-custom w-100" style="max-width: 450px;">
        <div class="card-body p-4 text-center">
          
          <!-- Clock -->
          <div class="bg-light rounded-3 p-3 mb-4 d-inline-block">
            <div id="clock" class="clock-display fs-2 fw-bold">--:--:--</div>
          </div>
          
          <!-- QR Scanner -->
          <div class="mb-4">
            <div class="scan-container mb-2">
              <video id="qr-video" class="w-100" playsinline></video>
              <div class="scan-line"></div>
            </div>
            <p class="small text-muted mb-0">Enfoca el código QR dentro del área</p>
          </div>
          
          <!-- Status -->
          <div class="my-3">
            <p class="small mb-0">
              <span class="status-indicator"></span>
              <span class="text-muted">Sistema activo - Listo para escanear</span>
            </p>
          </div>
          
          <!-- Brand -->
          <div class="mt-4 pt-3 border-top">
            <p class="small text-primary mb-0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="me-1">
                <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z" stroke="currentColor" stroke-width="2"/>
                <path d="M12 22V12" stroke="currentColor" stroke-width="2"/>
                <path d="M12 12L21 7" stroke="currentColor" stroke-width="2"/>
                <path d="M12 12L3 7" stroke="currentColor" stroke-width="2"/>
              </svg>
              Sistema KUDEA
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Reloj en tiempo real
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('es-ES', { hour12: false });
      document.getElementById('clock').textContent = time;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Lector QR
    const video = document.getElementById('qr-video');
    const canvas = document.createElement('canvas');
    const canvasContext = canvas.getContext('2d');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
      .then(function(stream) {
        video.srcObject = stream;
        video.play();

        const interval = setInterval(() => {
          if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvasContext.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvasContext.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code) {
              clearInterval(interval);
              video.pause();
              window.location.href = code.data;
            }
          }
        }, 200);
      })
      .catch(function(err) {
        console.error("Error al acceder a la cámara:", err);
        alert("No se pudo acceder a la cámara. Por favor asegúrate de haber concedido los permisos necesarios.");
      });
  </script>
</body>
</html>
