<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirmar pago</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FontAwesome (opcional) -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --kudea-dark: #1D3557;
      --kudea-medium: #457B9D;
      --kudea-accent: #A8DADC;
    }

    .btn-kudea {
      background-color: var(--kudea-medium);
      color: white;
      font-weight: 500;
    }

    .btn-kudea:hover {
      background-color: var(--kudea-dark);
    }

    .modal-title {
      font-weight: 600;
      color: var(--kudea-dark);
    }

    #payment-amount {
      font-size: 1.25rem;
      text-align: right;
    }

    #change-container {
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<!-- Modal Confirmar Pago -->
<div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <!-- Encabezado -->
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fas fa-cash-register me-2"></i>Confirmar pago
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <!-- Cuerpo del modal -->
      <form id="payment-form">
        <div class="modal-body">

          <p class="mb-3">
            ¿Confirmar el cobro de <strong id="modal-total" class="text-success">0,00 €</strong>?
          </p>

          <div class="mb-3">
            <label for="payment-amount" class="form-label">Cantidad recibida</label>
            <input type="text" class="form-control" id="payment-amount" placeholder="Ej: 20,00">
          </div>

          <div class="alert alert-info d-none" id="change-container">
            Cambio a devolver: <strong id="change-amount">0,00 €</strong>
          </div>

        </div>

        <!-- Pie del modal -->
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-kudea">
            <i class="fas fa-check-circle me-1"></i> Confirmar pago
          </button>
        </div>
      </form>

    </div>
  </div>
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
