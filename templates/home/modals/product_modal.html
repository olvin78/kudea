<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Añadir Producto</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --kudea-dark: #1D3557;
      --kudea-medium: #457B9D;
      --kudea-accent: #A8DADC;
    }

    .btn-kudea {
      background-color: var(--kudea-medium);
      color: white;
    }

    .btn-kudea:hover {
      background-color: var(--kudea-dark);
    }

    .modal-title {
      color: var(--kudea-dark);
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-box me-2"></i>Añadir Nuevo Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <form id="new-product-form" onsubmit="event.preventDefault(); TPV.addNewProduct();">
        <div class="modal-body">
          
          <div class="mb-3">
            <label for="product-name" class="form-label">Nombre del Producto</label>
            <input type="text" class="form-control" id="product-name" name="name" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="product-price" class="form-label">Precio (€)</label>
              <input type="number" step="0.01" class="form-control" id="product-price" name="price" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="product-stock" class="form-label">Stock inicial</label>
              <input type="number" class="form-control" id="product-stock" name="stock" value="0" min="0" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="product-category" class="form-label">Categoría</label>
            <input type="text" class="form-control" id="product-category" name="category" required>
          </div>

          <div class="mb-3">
            <label for="product-barcode" class="form-label">Código de barras (opcional)</label>
            <input type="text" class="form-control" id="product-barcode" name="barcode">
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-kudea">Guardar Producto</button>
        </div>
      </form>

    </div>
  </div>
</div>

<!-- Bootstrap Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- FontAwesome (solo si usas iconos) -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

</body>
</html>
