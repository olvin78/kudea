<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- FontAwesome (opcional) -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --kudea-dark: #1D3557;
      --kudea-medium: #457B9D;
      --kudea-accent: #A8DADC;
    }

    .btn-kudea {
      background-color: var(--kudea-medium);
      color: white;
    }

    .btn-kudea:hover {
      background-color: var(--kudea-dark);
    }

    .modal-title {
      font-weight: 600;
      color: var(--kudea-dark);
    }

    #inventory-total-value {
      font-size: 1.2rem;
      color: var(--kudea-dark);
    }
  </style>
</head>
<body>

<!-- Modal Inventario -->
<div class="modal fade" id="inventoryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">

      <!-- Cabecera -->
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fas fa-boxes me-2"></i>Gestión de Inventario
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <!-- Cuerpo -->
      <div class="modal-body">

        <div class="row mb-3">
          <div class="col-md-6">
            <p><strong>Total productos:</strong> <span id="inventory-total-items">0</span></p>
          </div>
          <div class="col-md-6 text-end">
            <p><strong>Valor total inventario:</strong> <span id="inventory-total-value" class="fw-bold">0,00 €</span></p>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>Producto</th>
                <th class="text-center">Stock</th>
                <th class="text-end">P. Unitario</th>
                <th class="text-end">Valor Total</th>
              </tr>
            </thead>
            <tbody id="inventory-items-list">
              <!-- Se llena con JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Pie -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-kudea" onclick="TPV.exportInventory()">
          <i class="fas fa-file-export me-1"></i> Exportar
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
