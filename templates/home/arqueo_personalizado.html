{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arqueo Personalizado | Kudea</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1d4ed8;
            --primary-dark: #1e3a8a;
            --kudea-dark: #123954;
            --kudea-bg: #f0f5fa;
            --border: #dde6ef;
            --text: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #eaf2f7, #f0f5fa);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 100%;
            max-width: 650px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(18, 57, 84, 0.12);
            padding: 3rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--kudea-dark), var(--primary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px rgba(29, 78, 216, 0.25);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--kudea-dark);
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 500px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--kudea-dark);
            opacity: 0.9;
        }

        input[type="date"] {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        input[type="date"]:hover {
            border-color: #cbd5e1;
        }

        input[type="date"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--kudea-dark), var(--primary));
            color: white;
            border: none;
            padding: 1.1rem;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(18, 57, 84, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(18, 57, 84, 0.3);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer-action {
            margin-top: 1.5rem;
            text-align: center;
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            padding: 0.5rem 1rem;
            border-radius: 10px;
        }

        .btn-back:hover {
            color: var(--kudea-dark);
            background: rgba(18, 57, 84, 0.05);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header">
            <div class="icon-circle">
                📊
            </div>
            <h1>Arqueo Especial</h1>
            <p class="subtitle">Selecciona el rango de fechas para el informe</p>
        </div>

        <form method="POST" action="{% url 'home_app:arqueo_personalizado' %}">
            {% csrf_token %}
            
            <div class="form-grid">
                <div class="input-group">
                    <label for="inicio">📆 Fecha Inicio</label>
                    <input type="date" id="inicio" name="inicio" required>
                </div>

                <div class="input-group">
                    <label for="fin">📍 Fecha Fin</label>
                    <input type="date" id="fin" name="fin" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <span>Generar Informe Detallado</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </form>

        <div class="footer-action">
            <a href="{% url 'home_app:arqueo_menu' %}" class="btn-back">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Regresar al Panel
            </a>
        </div>
    </div>

</body>
</html>
