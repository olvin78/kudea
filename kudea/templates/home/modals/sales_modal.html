<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ventas del día - TPV KUDEA</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome (opcional) -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --kudea-dark: #1D3557;
      --kudea-medium: #457B9D;
      --kudea-accent: #A8DADC;
    }

    .btn-kudea {
      background-color: var(--kudea-medium);
      color: white;
    }

    .btn-kudea:hover {
      background-color: var(--kudea-dark);
    }

    .modal-title {
      color: var(--kudea-dark);
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Modal de Ventas -->
<div class="modal fade" id="salesModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <!-- Cabecera -->
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-chart-bar me-2"></i>Ventas del día</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <!-- Cuerpo del modal -->
      <div class="modal-body">
        <div class="row mb-3">
          <div class="col-md-6">
            <p><strong>Fecha:</strong> <span id="sales-today">03/05/2025</span></p>
          </div>
          <div class="col-md-6 text-end">
            <p><strong>Total ventas:</strong> <span id="sales-total-amount" class="fw-bold">250,00 €</span></p>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead class="table-light">
              <tr>
                <th>Método de pago</th>
                <th class="text-end">Total</th>
              </tr>
            </thead>
            <tbody id="sales-by-method">
              <tr>
                <td>Efectivo</td>
                <td class="text-end">120,00 €</td>
              </tr>
              <tr>
                <td>Tarjeta</td>
                <td class="text-end">100,00 €</td>
              </tr>
              <tr>
                <td>Bizum</td>
                <td class="text-end">30,00 €</td>
              </tr>
            </tbody>
            <tfoot class="table-light">
              <tr>
                <th>Total ventas</th>
                <th class="text-end fw-bold" id="sales-total-count">250,00 €</th>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      <!-- Pie del modal -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" class="btn btn-kudea" onclick="window.print()">
          <i class="fas fa-print me-1"></i> Imprimir reporte
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script opcional para mostrar el modal automáticamente -->
<script>

  // const myModal = new bootstrap.Modal(document.getElementById('salesModal'));
  // myModal.show();
</script>

</body>
</html>
