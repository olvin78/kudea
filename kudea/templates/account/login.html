{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - KUDEA</title>
    
    <!-- Estética: Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS Output -->
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; }
        .login-card-cute {
            background: white;
            border-radius: 3rem;
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
        }
    </style>
</head>
<body class="h-full flex items-center justify-center p-6 relative overflow-hidden">
    
    <!-- Decoración de fondo sutil -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-50 rounded-full -ml-48 -mt-48 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-blue-50 rounded-full -mr-48 -mb-48 blur-3xl"></div>

    <div class="w-full max-w-md relative z-10">
        <div class="login-card-cute p-10 md:p-12">
            
            <div class="flex flex-col items-center mb-10">
                <div class="w-16 h-16 bg-blue-700 rounded-3xl flex items-center justify-center text-white shadow-lg shadow-blue-700/20 mb-4">
                    <i data-lucide="layout-grid" class="w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900">KUDEA</h1>
            </div>
            
            <!-- Botón de Google (Original POST) -->
            <form method="post" action="/accounts/google/login/">
                {% csrf_token %}
                <button type="submit" class="w-full flex items-center justify-center space-x-3 px-6 py-4 bg-white border-2 border-slate-100 rounded-2xl text-slate-700 font-bold hover:bg-slate-50 transition-all active:scale-[0.98]">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="20">
                    <span>Continuar con Google</span>
                </button>
            </form>

            <div class="relative flex items-center my-8">
                <div class="flex-grow border-t border-slate-100"></div>
                <span class="flex-shrink mx-4 text-xs font-bold text-slate-300 uppercase tracking-widest">o accede con</span>
                <div class="flex-grow border-t border-slate-100"></div>
            </div>

            <!-- Formulario Original -->
            <form method="POST" action="{% url 'account_login' %}" class="space-y-6">
                {% csrf_token %}
                {% if form.errors %}
                    <div class="p-4 bg-red-50 rounded-2xl border border-red-100 text-red-600 text-sm font-medium flex items-center gap-3">
                        <i data-lucide="alert-circle" class="w-5 h-5"></i>
                        <span>Usuario o contraseña incorrectos.</span>
                    </div>
                {% endif %}
                
                <div class="space-y-2">
                    <input type="email" name="login" id="id_login" class="w-full px-6 py-4 bg-slate-50 border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-700 transition-all outline-none" placeholder="Correo electrónico" required>
                </div>
                
                <div class="space-y-2">
                    <input type="password" name="password" id="id_password" class="w-full px-6 py-4 bg-slate-50 border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-blue-100 focus:border-blue-700 transition-all outline-none" placeholder="Contraseña" required>
                </div>

                <button type="submit" class="w-full py-4 bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-700/20 hover:bg-blue-800 transition-all hover:-translate-y-1 active:scale-[0.98]">
                    Entrar
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="/" class="inline-flex items-center space-x-2 text-sm font-bold text-slate-400 hover:text-blue-700 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span>Volver a la web</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
