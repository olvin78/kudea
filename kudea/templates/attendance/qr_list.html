<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Escanear QR | KUDEA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- jsQR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#499ecf',
                        'dark-blue': '#1D3557',
                        'light-blue': '#A8DADC',
                    },
                    fontFamily: {
                        'outfit': ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(73, 158, 207, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(29, 53, 87, 0.03) 0px, transparent 50%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(73, 158, 207, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
        }
        .scan-container {
            position: relative;
            overflow: hidden;
            border-radius: 2.5rem;
            border: 8px solid white;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.1);
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #499ecf, transparent);
            box-shadow: 0 0 15px #499ecf;
            animation: scan 2s infinite linear;
            z-index: 20;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="h-full bg-mesh flex flex-col">

    <header class="p-6 flex items-center justify-between">
        <a href="javascript:history.back()" class="w-12 h-12 rounded-2xl bg-white text-slate-400 hover:text-primary-blue flex items-center justify-center transition-all shadow-sm border border-slate-100">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="text-center">
            <h1 class="text-slate-800 font-black tracking-tight text-xl mb-0.5">KUDEA Fichaje</h1>
            <p class="text-primary-blue text-[10px] font-black uppercase tracking-[0.3em]">Scanner Activo</p>
        </div>
        <div class="w-12"></div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-4">
        <div class="w-full max-w-lg">
            
            <!-- REQUEST BUTTON (ABOVE) -->
            <div class="mb-8 flex gap-3">
                <button onclick="alert('Solicitud enviada al administrador')" class="flex-1 bg-dark-blue hover:bg-slate-800 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest text-center transition-all shadow-xl shadow-dark-blue/10">
                    <i class="fas fa-paper-plane mr-2"></i> Solicitar mi Código QR
                </button>
            </div>

            <!-- CLOCK GLASS -->
            <div class="glass-card rounded-[2rem] p-6 mb-8 text-center animate-fade-in">
                <div id="clock" class="text-5xl font-black text-slate-800 tracking-widest font-mono leading-none">--:--:--</div>
            </div>

            <!-- SCANNER BOX -->
            <div class="scan-container bg-slate-100 aspect-square relative animate-fade-in">
                <video id="qr-video" class="w-full h-full object-cover" playsinline></video>
                <div class="scan-line"></div>
                
                <div class="absolute top-8 left-8 w-12 h-12 border-t-4 border-l-4 border-primary-blue rounded-tl-2xl z-20"></div>
                <div class="absolute top-8 right-8 w-12 h-12 border-t-4 border-r-4 border-primary-blue rounded-tr-2xl z-20"></div>
                <div class="absolute bottom-8 left-8 w-12 h-12 border-b-4 border-l-4 border-primary-blue rounded-bl-2xl z-20"></div>
                <div class="absolute bottom-8 right-8 w-12 h-12 border-b-4 border-r-4 border-primary-blue rounded-br-2xl z-20"></div>

                <div id="loading-msg" class="absolute inset-0 flex flex-col items-center justify-center bg-white/95 z-40">
                    <div class="w-12 h-12 border-4 border-primary-blue border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-slate-800 font-black text-xs tracking-widest uppercase">Iniciando Cámara...</p>
                </div>
            </div>

            <!-- STATUS FOOTER -->
            <div class="mt-10 flex flex-col items-center">
                <div class="flex items-center gap-4 bg-white px-8 py-4 rounded-3xl shadow-sm border border-slate-100">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.4)] animate-pulse"></span>
                    <span class="text-slate-600 text-[11px] font-black uppercase tracking-widest">Listo para escanear</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('es-ES', { hour12: false });
            document.getElementById('clock').textContent = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const video = document.getElementById('qr-video');
        const loadingMsg = document.getElementById('loading-msg');
        const canvas = document.createElement('canvas');
        const canvasContext = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); loadingMsg.classList.add('hidden'); };

                const interval = setInterval(() => {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        canvasContext.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const imageData = canvasContext.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, imageData.width, imageData.height);
                        if (code && code.data.trim() !== "") {
                            clearInterval(interval); video.pause();
                            if (code.data.startsWith('http')) { window.location.href = code.data; }
                            else { window.location.href = `/attendance/fichar/${code.data}/`; }
                        }
                    }
                }, 300);
            })
            .catch(function(err) {
                loadingMsg.innerHTML = `<div class="text-red-500 text-4xl mb-4"><i class="fas fa-camera-slash"></i></div><p class="text-slate-800 font-black text-xs text-center px-10 uppercase tracking-widest">Error de cámara</p>`;
            });
    </script>
</body>
</html>
