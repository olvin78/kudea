{% extends 'tpv_shop/base_tpv_shop.html' %}
{% load static %}

{% block tpv_content %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --kudea-primary: #1D3557;
    --kudea-secondary: #457B9D;
    --kudea-accent: #A8DADC;
    --kudea-light: #F1FAEE;
    --kudea-danger: #E63946;
    --kudea-success: #2A9D8F;
    --glass-bg: rgba(255, 255, 255, 0.55);
    --glass-border: rgba(255, 255, 255, 0.25);
  }

  /* ======== FONDO GENERAL ESTILO POS PREMIUM ======== */
  body, .container {
    background: linear-gradient(135deg, #F1FAEE, #A8DADC, #F1FAEE);
    background-size: 200% 200%;
    animation: gradientMove 6s infinite alternate ease-in-out;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  /* ======== TARJETAS GLASSMORPHISM ======== */
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    padding: 2rem;
    transition: all 0.35s ease;
  }

  .glass-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }

  /* ======== TÍTULO PRINCIPAL ======== */
  h2 {
    font-weight: 700;
    color: var(--kudea-primary);
    letter-spacing: -0.5px;
  }

  /* ======== BOTONES MÉTODO DE PAGO ======== */
  .method-btn {
    padding: 1.4rem;
    border-radius: 18px;
    font-size: 1.25rem;
    font-weight: 600;
    border-width: 2px;
    transition: 0.3s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .method-btn span {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .method-btn i {
    font-size: 1.5rem;
  }

  .method-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
  }

  /* ======== CUADRO DE CONFIRMACIÓN ======== */
  #selectedAmount {
    color: var(--kudea-primary);
    font-size: 2rem;
  }

  /* ======== BLOQUE DE EFECTIVO ======== */
  #cashFields .glass-card {
    padding: 1.5rem;
  }

  #cashGiven {
    border-radius: 18px;
    border: 2px solid var(--kudea-secondary);
    padding: 0.8rem;
    background: white;
    font-size: 2rem;
    text-align: right;
    font-weight: 700;
  }

  #changeAmount {
    font-size: 1.8rem;
    font-weight: 700;
  }

  /* ======== TECLADO NUMÉRICO PREMIUM ======== */
  .custom-keypad button {
    padding: 1.3rem;
    font-size: 1.6rem;
    border-radius: 16px;
    border: none;
    background: white;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    transition: all 0.2s ease;
    font-weight: 600;
  }

  .custom-keypad button:hover {
    transform: translateY(-3px);
    background: var(--kudea-light);
  }

  .custom-keypad button:active {
    transform: scale(0.96);
  }

  .custom-keypad .btn-danger {
    background: #ffe6e6;
    color: var(--kudea-danger);
  }

  .keypad-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }

  /* ======== BOTÓN CONFIRMAR PAGO ======== */
  .btn-confirm {
    background: linear-gradient(135deg, var(--kudea-success), #1f8f77);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 1rem 2rem;
    font-size: 1.3rem;
    font-weight: 700;
    transition: 0.3s ease;
  }

  .btn-confirm:hover {
    transform: translateY(-3px);
    box-shadow: 0px 8px 18px rgba(0,0,0,0.2);
  }

</style>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10">

      <!-- TÍTULO -->
      <div class="text-center mb-5">
        <h2><i class="fas fa-wallet text-primary me-2"></i> Cobro en TPV</h2>
        <p class="text-muted">Seleccione el método de pago</p>
      </div>

      <!-- PASO 1 -->
      <div id="step-selection">
        <div class="glass-card">
          <h5 class="fw-bold mb-4">Seleccione método de pago</h5>

          <div class="d-grid gap-4">

            <button class="method-btn btn-outline-primary" onclick="confirmPayment('Tarjeta')">
              <span><i class="far fa-credit-card"></i> Tarjeta</span>
              <strong>{{ total_price|floatformat:2 }} €</strong>
            </button>

            <button class="method-btn btn-outline-success" onclick="confirmPayment('Efectivo')">
              <span><i class="fas fa-money-bill-wave"></i> Efectivo</span>
              <strong>{{ total_price|floatformat:2 }} €</strong>
            </button>

            <button class="method-btn btn-outline-info" onclick="confirmPayment('PayPal')">
              <span><i class="fab fa-paypal"></i> PayPal</span>
              <strong>{{ total_price|floatformat:2 }} €</strong>
            </button>

            <button class="method-btn btn-outline-dark" onclick="confirmPayment('Bizum')">
              <span><i class="fas fa-qrcode"></i> Bizum</span>
              <strong>{{ total_price|floatformat:2 }} €</strong>
            </button>

          </div>
        </div>
      </div>

      <!-- PASO 2 -->
      <div id="step-confirmation" style="display:none;">
        <div class="glass-card">

          <h4 class="fw-bold text-center mb-3">Confirmar pago</h4>

          <p class="text-center mb-2">Método seleccionado:</p>
          <p class="text-center fw-bold fs-4 text-primary" id="selectedMethod"></p>

          <p class="text-center">Importe:</p>
          <p class="text-center fw-bold" id="selectedAmount">{{ total_price|floatformat:2 }} €</p>

          <!-- EFECTIVO -->
          <div id="cashFields" style="display:none;">
            <div class="glass-card mb-4">
              <h6 class="fw-bold mb-3">Efectivo recibido</h6>
              <input type="text" id="cashGiven" class="form-control mb-3" readonly placeholder="0.00">
              <label class="form-label">Cambio:</label>
              <div id="changeAmount">0.00 €</div>
            </div>

            <div class="glass-card custom-keypad">
              <div class="keypad-grid">
                <button onclick="appendKey('1')">1</button>
                <button onclick="appendKey('2')">2</button>
                <button onclick="appendKey('3')">3</button>
                <button onclick="appendKey('4')">4</button>
                <button onclick="appendKey('5')">5</button>
                <button onclick="appendKey('6')">6</button>
                <button onclick="appendKey('7')">7</button>
                <button onclick="appendKey('8')">8</button>
                <button onclick="appendKey('9')">9</button>
                <button onclick="appendKey('.')">.</button>
                <button onclick="appendKey('0')">0</button>
                <button class="btn-danger" onclick="clearInput()">←</button>
              </div>
            </div>
          </div>

          <div class="text-center mt-4 d-flex justify-content-center gap-3">
            <button class="btn btn-outline-secondary px-4 py-2" onclick="goBack()">
              <i class="fas fa-arrow-left me-2"></i>Modificar
            </button>

            <form method="POST" action="{% url 'tpv_shop:finalizar_compra' %}">
              {% csrf_token %}
              <input type="hidden" name="payment_method" id="payment_method_input">
              <button type="submit" class="btn-confirm">
                <i class="fas fa-check-circle me-2"></i>Confirmar pago
              </button>
            </form>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
  let selectedMethod = '';

  function confirmPayment(method) {
    const total = parseFloat("{{ total_price }}");

    selectedMethod = method;
    document.getElementById('selectedMethod').textContent = method;
    document.getElementById('selectedAmount').textContent = total.toFixed(2) + " €";

    document.getElementById('payment_method_input').value = method;

    document.getElementById('step-selection').style.display = 'none';
    document.getElementById('step-confirmation').style.display = 'block';

    document.getElementById('cashFields').style.display = (method === 'Efectivo') ? 'block' : 'none';
  }

  function goBack() {
    document.getElementById('step-selection').style.display = 'block';
    document.getElementById('step-confirmation').style.display = 'none';
    document.getElementById('cashGiven').value = '';
    document.getElementById('changeAmount').textContent = '0.00 €';
  }

  function appendKey(value) {
    const input = document.getElementById('cashGiven');
    input.value += value;
    calculateChange();
  }

  function clearInput() {
    const input = document.getElementById('cashGiven');
    input.value = input.value.slice(0, -1);
    calculateChange();
  }

  function calculateChange() {
    const total = parseFloat("{{ total_price }}");
    const given = parseFloat(document.getElementById('cashGiven').value);
    const changeAmount = document.getElementById('changeAmount');

    if (!isNaN(given)) {
      const change = given - total;
      changeAmount.textContent = (change >= 0 ? "+" : "") + change.toFixed(2) + " €";
      changeAmount.style.color = change >= 0 ? "var(--kudea-success)" : "var(--kudea-danger)";
    } else {
      changeAmount.textContent = "0.00 €";
      changeAmount.style.color = "#000";
    }
  }
</script>

{% endblock %}
